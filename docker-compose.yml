# docker-compose.yml
# ──────────────────────────────────────────────────────────────────────────
# Local development INFRASTRUCTURE for Cashroom.
#
# Services:
#   - PostgreSQL     (durable, relational system-of-record)
#   - Redis          (in-memory store for BullMQ queues + caching)
#   - cashroom-backend (domain API; NestJS + TypeORM)
#   - cashroom-bff     (edge: reverse proxy + JWT verify + throttle + logging)
#
# Frontend + workers come in later steps. Services reach each other by SERVICE
# NAME over the compose default network (e.g. the backend finds the DB at
# `postgres:5432`, the BFF finds the backend at `cashroom-backend:3000`).
#
# NOTE: there is deliberately no top-level `version:` key. The old Compose
# file-format version (e.g. "3.8") is OBSOLETE under the modern Compose Spec
# that Docker Compose v2 uses. Keeping it now only prints a deprecation warning.
# ──────────────────────────────────────────────────────────────────────────

services:
  # ========================================================================
  # PostgreSQL — Cashroom's system of record.
  # Anything that must survive forever and be queried relationally lives here:
  # users, loan applications, disbursements, repayments, ledger entries.
  # ========================================================================
  postgres:
    image: postgres:17-alpine          # pinned major version; alpine = small base image
    container_name: cashroom-postgres  # stable, human-readable name (vs random hash)
    restart: unless-stopped            # auto-restart on crash/reboot, but not if YOU stop it
    ports:
      - "${POSTGRES_PORT:-5432}:5432"  # HOST:CONTAINER — expose db to tools on your machine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}          # superuser created on first boot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # that user's password
      POSTGRES_DB: ${POSTGRES_DB}              # database created on first boot
    volumes:
      - postgres_data:/var/lib/postgresql/data # persist data outside the container
    healthcheck:
      # pg_isready returns 0 only when Postgres can actually accept connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s      # run the check every 10s
      timeout: 5s        # fail the check if it takes >5s
      retries: 5         # mark unhealthy after 5 consecutive failures
      start_period: 10s  # grace window on first boot before failures count

  # ========================================================================
  # Redis — in-memory data store.
  # In Cashroom it backs BullMQ (job queues, retries, DLQ) and short-lived
  # caching/session data. Fast, but treated as ephemeral compared to Postgres.
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: cashroom-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # Override the default startup command to:
    #   --appendonly yes  -> turn on AOF persistence (write each op to disk)
    #   --requirepass ...  -> require a password even on localhost
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data   # AOF/RDB files live here so data survives restarts
    healthcheck:
      # Authenticated PING; -a passes the password. grep ensures we saw PONG.
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}  # makes the var available inside the container for healthcheck

  # ========================================================================
  # cashroom-backend — the domain API (NestJS + TypeORM).
  # Built from ./cashroom-backend. Reaches Postgres by SERVICE NAME over the
  # compose network, so DATABASE_HOST is `postgres` (NOT localhost, which inside
  # the container would be the backend itself).
  # Migrations are NOT run by this container — apply them from the host via
  # `npm run migration:run` (the lean prod image omits ts-node/src).
  # ========================================================================
  cashroom-backend:
    build:
      context: ./cashroom-backend
    container_name: cashroom-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # wait until the DB actually accepts connections
      redis:
        condition: service_healthy   # needed to enqueue the verification-email job
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}
      # Redis for BullMQ (reach it by service name), + verification-token signing.
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EMAIL_VERIFICATION_SECRET: ${EMAIL_VERIFICATION_SECRET}
      EMAIL_VERIFICATION_EXPIRES_IN: ${EMAIL_VERIFICATION_EXPIRES_IN}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      # busybox wget (bundled in alpine); /health returns 200 when the app is up.
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s   # allow time for Nest boot + DB connect

  # ========================================================================
  # cashroom-bff — Backend-for-Frontend edge (NestJS reverse proxy).
  # Verifies access JWTs, rate-limits per IP, logs, then proxies to the backend
  # by service name. This is the only app the browser/frontend talks to.
  # ========================================================================
  cashroom-bff:
    build:
      context: ./cashroom-bff
    container_name: cashroom-bff
    restart: unless-stopped
    depends_on:
      cashroom-backend:
        condition: service_healthy   # don't accept traffic until the backend is ready
    ports:
      - "${BFF_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_URL: http://cashroom-backend:3000
      JWT_SECRET: ${JWT_SECRET}                 # MUST match the backend to verify tokens
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      THROTTLE_TTL: ${THROTTLE_TTL}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      # /health is public → proxied straight to the backend's /health.
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ========================================================================
  # cashroom-worker — background job processor (BullMQ consumer).
  # SAME image as the backend, but a different entrypoint (command override):
  # it runs dist/worker/main.worker.js instead of the API. Runs as its OWN
  # process/container so a slow/stuck job can't block API request handling, and
  # so workers can be scaled/restarted independently of the API.
  # No DB env: this worker only logs (simulated email), so it needs Redis only.
  # ========================================================================
  cashroom-worker:
    # Same build context as the backend (identical image) but a SEPARATE build —
    # intentional: the worker is its own deployable. In prod you'd push one image
    # and run it with two different commands.
    build:
      context: ./cashroom-backend
    container_name: cashroom-worker
    restart: unless-stopped
    command: ["node", "dist/worker/main.worker"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  # ========================================================================
  # cashroom-frontend — the developer "glass box" UI (React + Vite dev server).
  # The BROWSER runs on your host, so it reaches the BFF at localhost:3001 —
  # VITE_BFF_URL uses the host-mapped port even in compose (NOT the internal
  # service name, which the browser can't resolve). Source is bind-mounted for
  # HMR; the anonymous volume preserves the container's own node_modules.
  # The BFF already allows this origin via FRONTEND_ORIGIN=http://localhost:5173.
  # ========================================================================
  cashroom-frontend:
    build:
      context: ./cashroom-frontend
    container_name: cashroom-frontend
    restart: unless-stopped
    depends_on:
      - cashroom-bff
    ports:
      - "5173:5173"
    environment:
      VITE_BFF_URL: http://localhost:3001
    volumes:
      - ./cashroom-frontend:/app
      - /app/node_modules

# ==========================================================================
# Named volumes.
# Docker manages these on the host; they outlive container create/destroy.
# This is what keeps your database from being wiped every `docker compose down`.
# ==========================================================================
volumes:
  postgres_data:
    name: cashroom_postgres_data
  redis_data:
    name: cashroom_redis_data
